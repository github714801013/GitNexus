services:
  mcp_proxy:
    image: ${REMOTE_IMAGE:-gitnexus-mcp-proxy:latest}
    build:
      context: ..
      dockerfile: mcp_proxy_docker/Dockerfile
    container_name: gitnexus-mcp-proxy
    ports:
      - "1347:1347"
      - "1348:1348"
    environment:
      - GITEA_SECRET=${GITEA_SECRET}
      - PROJECTS_ROOT=${PROJECTS_ROOT}
      - HOME=/root
    volumes:
      # Map host PROJECTS_ROOT to the SAME path in container
      - ${PROJECTS_ROOT}:${PROJECTS_ROOT}
      # Map host .gitnexus config/indices to the same path for persistence
      - ${HOME}/.gitnexus:/root/.gitnexus
      # Optional: Share host's npm global packages if needed, 
      # but we linked inside the container, so it's fine.
    restart: unless-stopped

networks:
  default:
    name: gitnexus-network
